name: Testes e build

# Roda a cada push e em todo pull request. O objetivo é pegar regressão ANTES
# do Railway publicar: o deploy é automático no push para a main, então este é
# o único ponto em que um erro ainda custa barato.

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  backend:
    name: Backend (testes + build)
    runs-on: ubuntu-latest

    # Postgres de verdade: os testes verificam isolamento entre igrejas, o que
    # depende de SQL real. Banco mockado não provaria nada.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igreja360_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/igreja360_test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/igreja360_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Verificação de tipos
        run: npx tsc --noEmit -p tsconfig.json

      - name: Testes de integração
        run: npm test

      - name: Build
        run: npm run build

  web:
    name: Portal (tipos + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Verificação de tipos
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
